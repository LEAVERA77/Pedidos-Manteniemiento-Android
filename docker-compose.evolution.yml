# Evolution API v2 + PostgreSQL + Redis.
# La imagen oficial suele asumir Redis (cache); sin él el QR puede no generarse.
# Uso desde api/: npm run evolution:up
#
# Opcional: .env.evolution desde .env.evolution.example
#   docker compose --env-file ../.env.evolution -f ../docker-compose.evolution.yml up -d

services:
  evolution-api:
    # Oficial / mantenida: evoapicloud/evolution-api (ej. :v2.3.7). atendai suele ser alias antiguo.
    image: ${EVOLUTION_IMAGE:-atendai/evolution-api:latest}
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-gestornova-evolution-2026}
      - AUTHENTICATION_TYPE=apikey

      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVOLUTION_DB_USER:-evolution}:${EVOLUTION_DB_PASSWORD:-evolution123}@postgres:5432/${EVOLUTION_DB_NAME:-evolution}?schema=public

      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution

      - LANGUAGE=es
      - LOG_LEVEL=INFO
      - DEL_INSTANCE=false

      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}

      # Node: evita timeouts raros de red (IPv6/DNS) que dejan el QR en blanco (ver GitHub #2367)
      - NODE_OPTIONS=--network-family-autoselection-attempt-timeout=5000

      # Baileys: probá otras versiones si el QR sigue vacío (WhatsApp → Ayuda versión Web)
      - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION:-2.3000.1028450369}
      - CONFIG_SESSION_PHONE_CLIENT=Evolution API
      - CONFIG_SESSION_PHONE_NAME=Chrome

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - evolution-network

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - evolution-network

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${EVOLUTION_DB_USER:-evolution}
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASSWORD:-evolution123}
      - POSTGRES_DB=${EVOLUTION_DB_NAME:-evolution}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - evolution-network

volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:

networks:
  evolution-network:
    driver: bridge
