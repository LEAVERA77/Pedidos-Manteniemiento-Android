# Evolution API v2 + PostgreSQL (evita "Database provider invalid").
# Documentación: https://doc.evolution-api.com/v2/en/env
# Uso desde carpeta api/: npm run evolution:up
#
# Opcional: copiá .env.evolution.example → .env.evolution en la raíz del repo y ajustá credenciales.
# Docker Compose carga variables desde el directorio de trabajo; con --env-file explícito:
#   docker compose --env-file ../.env.evolution -f ../docker-compose.evolution.yml up -d

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      # Autenticación (mismo valor que EVOLUTION_API_KEY en api/.env)
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-gestornova-evolution-2026}
      - AUTHENTICATION_TYPE=apikey

      # Base de datos (oficial: DATABASE_CONNECTION_URI + DATABASE_ENABLED)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVOLUTION_DB_USER:-evolution}:${EVOLUTION_DB_PASSWORD:-evolution123}@postgres:5432/${EVOLUTION_DB_NAME:-evolution}?schema=public

      - LANGUAGE=es
      - LOG_LEVEL=INFO
      - DEL_INSTANCE=false

      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - evolution-network

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${EVOLUTION_DB_USER:-evolution}
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASSWORD:-evolution123}
      - POSTGRES_DB=${EVOLUTION_DB_NAME:-evolution}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - evolution-network

volumes:
  evolution_instances:
  postgres_data:

networks:
  evolution-network:
    driver: bridge
