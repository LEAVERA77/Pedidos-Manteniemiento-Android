# Patrón oficial GitHub: job build (artefacto) + job deploy (solo deploy-pages).
# Secret obligatorio: NEON_CONNECTION_STRING (Settings → Secrets → Actions).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Generar config.json desde secretos
        env:
          NEON_CS: ${{ secrets.NEON_CONNECTION_STRING }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          EJS_PK: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EJS_SV: ${{ secrets.EMAILJS_SERVICE_ID }}
          EJS_TPL: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EJS_TPL_INFORME: ${{ secrets.EMAILJS_TEMPLATE_ID_INFORME }}
        run: |
          if [ -z "$NEON_CS" ]; then
            echo "::error::Falta el secret NEON_CONNECTION_STRING en Settings → Secrets and variables → Actions."
            exit 1
          fi
          jq -n \
            --arg cs "$NEON_CS" \
            --arg api "${API_BASE_URL:-}" \
            --arg pk "${EJS_PK:-}" \
            --arg sv "${EJS_SV:-}" \
            --arg tpl "${EJS_TPL:-}" \
            --arg tplInf "${EJS_TPL_INFORME:-}" \
            '{neon:{connectionString:$cs},api:{baseUrl:$api},emailjs:{publicKey:$pk,serviceId:$sv,templateId:$tpl,templateIdInforme:$tplInf,templateIdReset:$tpl},app:{version:"2.0.4"}}' \
            > config.json
          echo "OK: config.json generado (v2.0.4 con escapeHtml fix)."

      - name: Preparar carpeta publicable
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html sw.js styles.css app.js map.js map-view.js offline.js autocompletado-calles.js config.example.json config.json dist/
          for f in status.html seguridad.html gn-trust-ui.css gn-android-shell-perf.css; do
            [ -f "$f" ] && cp "$f" dist/ || true
          done
          # app.js importa ES modules desde ./modules/*.js — sin esto el bundle falla en silencio (WebView).
          if [ -d modules ]; then
            mkdir -p dist/modules
            for f in modules/*.js; do [ -f "$f" ] && cp "$f" dist/modules/; done
          fi
          [ -f admin-web-responsive.css ] && cp admin-web-responsive.css dist/ || true
          [ -f index.min.html ] && cp index.min.html dist/ || true
          [ -f sync-worker.js ] && cp sync-worker.js dist/ || true
          if [ -d js ]; then mkdir -p dist/js && cp -r js/. dist/js/; fi
          if [ -d branding ]; then mkdir -p dist/branding && cp -r branding/. dist/branding/; fi
          [ -f gestornova-logo.png ] && cp gestornova-logo.png dist/ || true
          if [ -d privacy ]; then mkdir -p dist/privacy && cp -r privacy/* dist/privacy/; fi
          [ -f README.md ] && cp README.md dist/ || true
          [ -f SECURITY.md ] && cp SECURITY.md dist/ || true
          [ -f COPYRIGHT.md ] && cp COPYRIGHT.md dist/ || true
          touch dist/.nojekyll

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
